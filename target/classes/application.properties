# Spring datasource — configure for your local MySQL instance
spring.datasource.url=jdbc:mysql://localhost:3306/quickcommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Use MySQL dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Prevent Spring Boot from starting an embedded web server (we run a Swing UI)
spring.main.web-application-type=none
# Ensure AWT is available for Swing UI
spring.main.headless=false